name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
      - name: Run unit tests
        run: |
          pytest -q --maxfail=1 --cov=dataplicity_cli --cov-report=term-missing

  lint-and-smoke:
    name: Compile + help smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Compile
        run: python -m compileall -q dataplicity_cli
      - name: Help smoke
        run: python -m dataplicity_cli --help

  no-artifacts-tracked:
    name: No build artifacts tracked
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if build byproducts are tracked
        shell: bash
        run: |
          python - <<'PY'
          import subprocess, sys

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          forbidden_prefixes = (
              "dist/",
              "release/",
              "pyinstaller-dist/",
              "pyinstaller-build/",
              "tmp-release/",
          )
          forbidden_suffixes = (
              ".msi",
              ".pkg",
              ".cab",
              ".wixobj",
              ".wixpdb",
              ".exe",
          )

          bad = [
              f
              for f in files
              if f.startswith(forbidden_prefixes) or f.endswith(forbidden_suffixes)
          ]
          if bad:
              sys.stderr.write("Forbidden build/release artifacts are tracked in git:\n")
              sys.stderr.write("\n".join(bad) + "\n")
              sys.exit(1)
          print("OK: no forbidden artifacts tracked")
          PY

