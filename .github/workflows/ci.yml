name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-smoke:
    name: Compile + help smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Compile
        run: python -m compileall -q dataplicity_cli
      - name: Help smoke
        run: python -m dataplicity_cli --help

