name: Update WinGet package

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v0.1.5)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: "winget-${{ github.event.release.tag_name || inputs.release_tag }}"
  cancel-in-progress: false

jobs:
  publish-winget:
    name: Publish release to WinGet
    runs-on: ubuntu-latest
    steps:
      - name: Validate WinGet token
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${WINGET_TOKEN}" ]]; then
            echo "Missing required repository secret: WINGET_TOKEN" >&2
            exit 1
          fi

      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@7bd472be23763def6e16bd06cc8b1cdfab0e2fd5
        with:
          identifier: Wildfoundry.DataplicityCLI
          release-tag: ${{ github.event.release.tag_name || inputs.release_tag }}
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
