name: Bootstrap WinGet package

"on":
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "winget-bootstrap"
  cancel-in-progress: false

jobs:
  submit-initial-manifest:
    name: Submit initial WinGet manifest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate WinGet token
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "Missing required repository secret: WINGET_TOKEN"
          }

      - name: Check package is not already bootstrapped
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageId = "Wildfoundry.DataplicityCLI"
          $manifestUrl = "https://github.com/microsoft/winget-pkgs/tree/master/manifests/$($packageId.ToLower()[0])/$($packageId.Replace('.', '/'))"

          try {
            Invoke-WebRequest -Uri $manifestUrl -Method Head -UseBasicParsing | Out-Null
            throw "Package $packageId already exists in winget-pkgs. Use update-winget.yml for future releases."
          } catch {
            if ($_.Exception.Message -like "Package $packageId already exists*") {
              throw
            }
            Write-Host "Package $packageId is not present yet; continuing with bootstrap submission."
          }

      - name: Check WinGet token owner and fork access
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            Authorization = "Bearer $env:WINGET_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $user = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/user"
          Write-Host "WINGET_TOKEN owner: $($user.login)"

          $fork = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/wildfoundry/winget-pkgs"
          if (-not $fork.fork -or $fork.parent.full_name -ne "microsoft/winget-pkgs") {
            throw "wildfoundry/winget-pkgs is not a fork of microsoft/winget-pkgs."
          }
          Write-Host "Found fork: $($fork.full_name), parent: $($fork.parent.full_name)"

          if ($fork.permissions) {
            Write-Host "Token permissions on wildfoundry/winget-pkgs: admin=$($fork.permissions.admin), push=$($fork.permissions.push), maintain=$($fork.permissions.maintain)"
            if (-not ($fork.permissions.push -or $fork.permissions.admin -or $fork.permissions.maintain)) {
              throw "WINGET_TOKEN owner cannot push to wildfoundry/winget-pkgs."
            }
          } else {
            Write-Host "GitHub API did not return repository permissions for this token."
          }

      - name: Download WinGetCreate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe -UseBasicParsing

      - name: Submit initial manifest
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $manifestPath = "build/winget/manifests/w/Wildfoundry/DataplicityCLI/0.1.6"
          $prTitle = "New package: Wildfoundry.DataplicityCLI version 0.1.6"

          ./wingetcreate.exe submit `
            --token $env:WINGET_TOKEN `
            --prtitle $prTitle `
            --no-open `
            $manifestPath
