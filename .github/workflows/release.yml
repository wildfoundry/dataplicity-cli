name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-14
            macos_arch: arm64
          - name: macos-x86_64
            os: macos-13
            macos_arch: x86_64
          - name: windows-x64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        shell: bash
        run: |
          if [[ -n "${GITHUB_REF_NAME:-}" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          else
            echo "VERSION=$(python build/get_version.py)" >> "${GITHUB_ENV}"
          fi

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build standalone binary
        run: pyinstaller --noconfirm --clean --onefile --name dataplicity dataplicity_cli/__main__.py

      - name: Build macOS tarball (for Homebrew)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          tar -C dist -czf "dist/dataplicity-cli-${VERSION}-macos-${{ matrix.macos_arch }}.tar.gz" dataplicity

      - name: Build macOS pkg
        if: runner.os == 'macOS'
        run: |
          chmod +x build/macos/build_pkg.sh
          ./build/macos/build_pkg.sh "${VERSION}" "${{ matrix.macos_arch }}"

      - name: Install WiX
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y

      - name: Build Windows msi
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build/windows/build_msi.ps1 -Version "${env:VERSION}"

      - name: Generate checksums
        run: python build/generate_checksums.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*

