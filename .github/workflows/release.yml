name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal2
            os: macos-14
            macos_arch: universal2
          - name: windows-x64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve version
        shell: bash
        run: |
          if [[ -n "${GITHUB_REF_NAME:-}" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          else
            echo "VERSION=$(python build/get_version.py)" >> "${GITHUB_ENV}"
          fi

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller
      
      - name: Build standalone binary (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile --name dataplicity \
            --target-architecture "${{ matrix.macos_arch }}" \
            --exclude-module websockets.speedups \
            --workpath pyinstaller-build --distpath pyinstaller-dist \
            dataplicity_cli/__main__.py

      - name: Build standalone binary (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --noconfirm --clean --onefile --name dataplicity --workpath pyinstaller-build --distpath pyinstaller-dist dataplicity_cli/__main__.py

      - name: Setup .NET for Artifact Signing
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Azure login for Artifact Signing
        if: runner.os == 'Windows'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows executable
        if: runner.os == 'Windows'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\pyinstaller-dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Windows executable signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "pyinstaller-dist/dataplicity.exe"
          if ($signature.Status -ne "Valid") {
            throw "Executable signature is $($signature.Status): $($signature.StatusMessage)"
          }
          Write-Host "Executable signed by $($signature.SignerCertificate.Subject)"

      - name: Build macOS tarball (for Homebrew)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist release
          tar -C pyinstaller-dist -czf "dist/dataplicity-cli-${VERSION}-macos-${{ matrix.macos_arch }}.tar.gz" dataplicity

      - name: Build macOS pkg
        if: runner.os == 'macOS'
        run: |
          chmod +x build/macos/build_pkg.sh
          ./build/macos/build_pkg.sh "${VERSION}" "${{ matrix.macos_arch }}"

      - name: Stage macOS release artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release
          cp "dist/dataplicity-cli-${VERSION}-macos-${{ matrix.macos_arch }}.pkg" release/
          cp "dist/dataplicity-cli-${VERSION}-macos-${{ matrix.macos_arch }}.tar.gz" release/
          python build/generate_checksums.py \
            --dist-dir release \
            --output "SHA256SUMS-macos-${{ matrix.macos_arch }}.txt" \
            --file "dataplicity-cli-${VERSION}-macos-${{ matrix.macos_arch }}.pkg" \
            --file "dataplicity-cli-${VERSION}-macos-${{ matrix.macos_arch }}.tar.gz"

      - name: Install WiX
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y

      - name: Build Windows msi
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build/windows/build_msi.ps1 -Version "${env:VERSION}"

      - name: Sign Windows MSI
        if: runner.os == 'Windows'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\dist
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Windows MSI signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = Get-ChildItem "dist/*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "No MSI found to verify."
          }
          $signature = Get-AuthenticodeSignature $msi.FullName
          if ($signature.Status -ne "Valid") {
            throw "MSI signature is $($signature.Status): $($signature.StatusMessage)"
          }
          Write-Host "MSI signed by $($signature.SignerCertificate.Subject)"

      - name: Stage Windows release artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist/dataplicity-cli-${env:VERSION}-windows-x64.msi" release/
          python build/generate_checksums.py `
            --dist-dir release `
            --output "SHA256SUMS-windows-x64.txt" `
            --file "dataplicity-cli-${env:VERSION}-windows-x64.msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*

